name: publish-iluvatar-ci-image

on:
  push:
    branches:
      - ci/publish-image-*
  workflow_dispatch:
    inputs:
      tag:
        description: "Primary image tag"
        required: true
        default: "stable"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: build-and-push
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image name
        id: meta
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/flydsl-iluvatar-ci"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        env:
          TAG_INPUT: ${{ inputs.tag }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/Dockerfile.iluvatar-ci
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ env.TAG_INPUT != '' && env.TAG_INPUT || 'stable' }}
            ${{ steps.meta.outputs.image }}:sha-${{ github.sha }}

      - name: Print digest summary
        run: |
          {
            echo "### Iluvatar CI image published"
            echo ""
            echo "- image: \`${{ steps.meta.outputs.image }}\`"
            echo "- tag: \`${{ env.TAG_INPUT != '' && env.TAG_INPUT || 'stable' }}\`"
            echo "- digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- immutable ref: \`${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
