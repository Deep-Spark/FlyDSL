name: IR Tests (multi-backend)

on:
  push:
    branches:
      - main
      - deep-spark-main
      - 'test/ir-*'
  pull_request:
    branches:
      - main
      - deep-spark-main
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner type"
        type: choice
        options:
          - self-hosted
          - github-hosted
        default: self-hosted

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ir-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: rocdl
            llvm_hash_file: thirdparty/llvm-hash.txt
            llvm_remote: "https://github.com/llvm/llvm-project.git"
            run_gpu_tests: false
          - backend: iluvatar
            llvm_hash_file: thirdparty/llvm-hash-iluvatar.txt
            llvm_remote: "https://github.com/llvm/llvm-project.git"
            run_gpu_tests: true
    name: ir-tests (${{ matrix.backend }})
    runs-on: >-
      ${{
        (github.event_name == 'workflow_dispatch' && inputs.runner == 'github-hosted')
        && 'ubuntu-22.04'
        || 'self-hosted'
      }}
    env:
      BUILD_SUFFIX: ${{ matrix.backend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: flydsl-test
          submodules: recursive

      # ================================================================
      # Environment setup (GitHub-hosted only — self-hosted container
      # already has all dependencies pre-installed)
      # ================================================================
      - name: Setup Python
        if: runner.environment == 'github-hosted'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        if: runner.environment == 'github-hosted'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build build-essential

      - name: Install Python dependencies
        if: runner.environment == 'github-hosted'
        run: |
          python3 -m pip install -U pip setuptools wheel uv
          python3 -m pip install ninja 'hypothesis>=6.82.0' nanobind pybind11 numpy pytest

      # ================================================================
      # MLIR cache (per-backend)
      # ================================================================
      - name: Restore cached MLIR install tarball
        id: mlir-cache
        uses: actions/cache@v4
        with:
          path: mlir_install-${{ matrix.backend }}.tgz
          key: >-
            ir-tests-${{ matrix.backend }}-${{
              hashFiles(
                format('flydsl-test/{0}', matrix.llvm_hash_file),
                'flydsl-test/scripts/build_llvm.sh',
                'flydsl-test/CMakeLists.txt',
                'flydsl-test/.github/workflows/ir-tests.yaml'
              )
            }}

      - name: Restore MLIR from cache
        if: steps.mlir-cache.outputs.cache-hit == 'true'
        run: |
          mkdir -p llvm-project
          tar -xzf "mlir_install-${BUILD_SUFFIX}.tgz" -C llvm-project
          ls -la llvm-project/mlir_install/lib/cmake/mlir

      # ================================================================
      # Build LLVM (cache miss only)
      # ================================================================
      - name: Build LLVM
        if: steps.mlir-cache.outputs.cache-hit != 'true'
        run: |
          set -ex
          export LLVM_COMMIT=$(cat "flydsl-test/${{ matrix.llvm_hash_file }}" | tr -d '[:space:]')
          export LLVM_REMOTE='${{ matrix.llvm_remote }}'
          export LLVM_TARGETS="X86"
          export MLIR_ROCM_RUNNER="OFF"
          cd flydsl-test && bash scripts/build_llvm.sh
          cp "$GITHUB_WORKSPACE/llvm-project/mlir_install.tgz" \
             "$GITHUB_WORKSPACE/mlir_install-${BUILD_SUFFIX}.tgz" || true

      # ================================================================
      # Build FlyDSL
      # ================================================================
      - name: Build FlyDSL
        run: |
          export MLIR_PATH="$GITHUB_WORKSPACE/llvm-project/mlir_install"
          export FLY_BUILD_DIR="$GITHUB_WORKSPACE/flydsl-test/build-fly-${BUILD_SUFFIX}"
          export FLY_ENABLE_ROCM=OFF
          cd flydsl-test && python3 -m pip install -e . --use-pep517

      # ================================================================
      # IR tests (always run)
      # ================================================================
      - name: Run IR unit tests
        run: |
          cd flydsl-test
          BUILD_DIR="$(pwd)/build-fly-${BUILD_SUFFIX}"
          export PYTHONPATH="${BUILD_DIR}/python_packages:$(pwd):${PYTHONPATH:-}"
          export LD_LIBRARY_PATH="${BUILD_DIR}/python_packages/flydsl/_mlir/_mlir_libs:${LD_LIBRARY_PATH:-}"

          IR_TESTS=(
            tests/unit/test_layout_algebra.py
            tests/unit/test_static_vs_dynamic.py
            tests/unit/test_async_object_vs_deps.py
            tests/unit/test_device_runtime.py
          )
          if python3 -c "import torch" 2>/dev/null; then
            IR_TESTS+=(tests/unit/test_rocir_print.py)
          fi
          python3 -m pytest "${IR_TESTS[@]}" -v --no-header --tb=short

      - name: Run mlir FileCheck tests
        run: |
          export FLY_BUILD_DIR="$GITHUB_WORKSPACE/flydsl-test/build-fly-${BUILD_SUFFIX}"
          cd flydsl-test && RUN_MLIR_TESTS_ONLY=1 bash scripts/run_tests.sh

      # ================================================================
      # GPU kernel tests (only when hardware is available)
      # ================================================================
      - name: Run GPU kernel tests
        if: matrix.run_gpu_tests
        run: |
          cd flydsl-test
          BUILD_DIR="$(pwd)/build-fly-${BUILD_SUFFIX}"
          export PYTHONPATH="${BUILD_DIR}/python_packages:$(pwd):${PYTHONPATH:-}"
          export LD_LIBRARY_PATH="${BUILD_DIR}/python_packages/flydsl/_mlir/_mlir_libs:${LD_LIBRARY_PATH:-}"
          python3 -m pytest tests/kernels/ -v --no-header --tb=short
